<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9x-Exodus Infinity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; }
        .btn-ui { position: absolute; bottom: 60px; width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10; touch-action: none; }
        #btn-jump { right: 40px; }
        /* Ikon serangan diganti jadi pukulan agar lebih aman di GitHub */
        #btn-attack { right: 130px; background: rgba(255, 165, 0, 0.3); border-color: orange; }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

    <div id="joystick-zone"></div>
    <div id="btn-jump" class="btn-ui">JUMP</div>
    <div id="btn-attack" class="btn-ui">👊</div>
    <audio id="bgm" loop>
    <source src="https://github.com/FAYU-HUB/WebBlox-Alpha/raw/refs/heads/main/DOORS%20Roblox%20OST_%20Elevator%20Jam.mp3" type="audio/mpeg">
    </audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        document.getElementById('bgm');
        bgm.volume = 0.3; // Set volume 50% biar nggak kekencangan
        
        window.addEventListener('touchstart', () => {
        if (bgm.paused) {
            bgm.play().catch(e => console.log("Musik diblokir browser, butuh interaksi lagi."));
        }
        }, { once: true }); // 'once: true' artinya cuma jalan sekali pas klik pertama
         
        // --- 1. CONFIG & STATE ---
        // Hubungkan ke server kamu (Ganti localhost jikahosting online)
        const socket = io('http://localhost:7700'); 
        let remotePlayers = {};
        let moveData = { x: 0, y: 0 };
        let vY = 0;
        
        // Kamera State
        let cameraRotation = 0; 
        let cameraPitch = 0.5;  
        let isTouching = false;
        let lastTouchX = 0, lastTouchY = 0;

        // Radius Spawn objek dari tengah (agar tidak terlalu jauh)
        const SPAWN_RANGE = 500; 

        // --- 2. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        // Kabut (Fog) sangat penting di map luas agar ujung map halus
        scene.fog = new THREE.Fog(0x87CEEB, 20, SPAWN_RANGE + 50); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Aktifkan bayangan
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6)); // Lampu lingkungan
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(200, 300, 100);
        sun.castShadow = true;
        // Kualitas bayangan
        sun.shadow.mapSize.width = 2048; 
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.far = 1000;
        // Area bayangan DirectionalLight (harus luas)
        const d = 500;
        sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
        sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
        scene.add(sun);

        // --- 3. LANTAI RAKSASA (Baseplate) ---
        const loader = new THREE.TextureLoader();
        // Memakai tekstur rumput
        const grassTexture = loader.load('https://files.catbox.moe/lbkbsp.jpeg');
        grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
        // Diulang banyak agar detail tidak pecah di map super luas
        grassTexture.repeat.set(500, 500); 

        // Ukuran lantai diubah kembali ke 2000 untuk performa HP
        // Map 200000 terlalu ekstrem untuk HP jika diberi tabrakan/bayangan.
        const floorGeo = new THREE.PlaneGeometry(10000, 10000);
        const floorMat = new THREE.MeshStandardMaterial({ map: grassTexture });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true; // Lantai menerima bayangan
        scene.add(floor);

        // --- 4. KARAKTER ---
        function createCharacter(color, name) {
            const group = new THREE.Group();
            // Badan
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.6), new THREE.MeshStandardMaterial({ color: color }));
            body.castShadow = true;
            body.position.y = 0.75;
            // Kepala
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 1.6;
            head.castShadow = true;
            group.add(body, head);
            return group;
        }

        const player = createCharacter(0x2196F3, "You");
        player.position.y = 0; // Kaki di tanah (0)
        scene.add(player);

        // --- 5. RINTANGAN (OBSTACLES) ---
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        for(let i=0; i<20; i++) {
            const obstacle = new THREE.Mesh(boxGeo, boxMat);
            obstacle.position.set(Math.random()*200-100, 1, Math.random()*200-100);
            obstacle.castShadow = true;
            scene.add(obstacle);
        }

        // --- 6. ENVIRONMENT GENERATOR (GUNUNG & POHON ACAK) ---
        const treeGroup = new THREE.Group();
        const mountainGroup = new THREE.Group();

        // Fungsi buat Pohon (Kerucut + Tabung)
        function createTree() {
            const group = new THREE.Group();
            // Batang
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, 2), 
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            trunk.position.y = 1;
            trunk.castShadow = true;
            // Daun
            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(1.5, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            leaves.position.y = 3.5;
            leaves.castShadow = true;
            group.add(trunk, leaves);
            return group;
        }

        // Generate 100 Pohon Acak
        for(let i=0; i<170; i++) {
            const tree = createTree();
            // Posisi acak di sekitar spawn
            const x = (Math.random() - 0.5) * SPAWN_RANGE * 2;
            const z = (Math.random() - 0.5) * SPAWN_RANGE * 2;
            // Hindari area tengah agar player tidak terjepit pohon saat masuk
            if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; 
            
            tree.position.set(x, 0, z);
            tree.rotation.y = Math.random() * Math.PI; // Rotasi acak daun
            treeGroup.add(tree);
        }
        scene.add(treeGroup);

        // Fungsi buat Gunung (Kerucut Raksasa)
        for(let i=0; i<20; i++) {
            const height = 30 + Math.random() * 50; // Tinggi acak 30-80
            const radius = 20 + Math.random() * 30; // Lebar bawah acak 20-50
            
            const mountainGeo = new THREE.ConeGeometry(radius, height, 4); // Kerucut segi 4
            const mountainMat = new THREE.MeshStandardMaterial({ 
                color: 0x708090, // Abu-abu kebiruan
                flatShading: true // Kesan polygon kaku
            });
            const mountain = new THREE.Mesh(mountainGeo, mountainMat);
            
            // Posisi di luar area rintangan/pohon agar tidak tumpang tindih
            const x = (Math.random() - 0.5) * SPAWN_RANGE * 2.5;
            const z = (Math.random() - 0.5) * SPAWN_RANGE * 2.5;
            if (Math.abs(x) < 150 && Math.abs(z) < 150) continue; // Area tengah steril gunung

            mountain.position.set(x, height / 2, z); // Posisi Y adalah setengah tinggi agar dasar di tanah
            mountain.rotation.y = Math.random() * Math.PI;
            mountain.receiveShadow = true;
            // Untuk HP, sebaiknya gunung tidak cast shadow (berat)
            mountainGroup.add(mountain);
        }
        scene.add(mountainGroup);


        // --- 7. NPC RELAX ---
        const npcs = [];
        for(let i=0; i<8; i++) {
            const bot = createCharacter(0x666666, "NPC");
            // Spawn kaki di 0
            bot.position.set(Math.random()*100-50, 0, Math.random()*100-50);
            // Target jalan santai dalam radius 200
            bot.userData.targetPos = new THREE.Vector3(Math.random()*400-200, 0, Math.random()*400-200);
            scene.add(bot);
            npcs.push(bot);
        }

        // --- 8. INPUT LISTENERS ---
        const joystick = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joystick.on('move', (e, d) => { moveData = { x: d.vector.x, y: d.vector.y }; });
        joystick.on('end', () => { moveData = { x: 0, y: 0 }; });

        // Touch Area Rotasi Kamera
        window.addEventListener('touchstart', (e) => {
            if (e.target.id === 'joystick-zone' || e.target.classList.contains('btn-ui')) return;
            isTouching = true;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const deltaX = e.touches[0].clientX - lastTouchX;
            const deltaY = e.touches[0].clientY - lastTouchY;
            cameraRotation -= deltaX * 0.005; // Horizontal sensitivitas
            // Batasi Pitch atas/bawah agar tidak jungkir balik
            cameraPitch = Math.max(0.1, Math.min(1.4, cameraPitch + deltaY * 0.005));
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => { isTouching = false; });

        document.getElementById('btn-jump').addEventListener('touchstart', () => { 
            if(player.position.y <= 0.01) vY = 0.28; // Lompatan sedikit lebih tinggi
        });
        
        document.getElementById('btn-attack').addEventListener('touchstart', () => {
            // Animasi pukul visual
            player.children[0].material.color.set(0xffffff);
            setTimeout(() => player.children[0].material.color.set(0x2196F3), 100);
            
            // Cek pukul player lain (Knockback)
            Object.keys(remotePlayers).forEach(id => {
                const target = remotePlayers[id];
                if(player.position.distanceTo(target.position) < 3) {
                    // Beritahu server kita memukul player 'id'
                    socket.emit('attack', id); 
                    // Efek visual pukul lokal ke target
                    target.children[0].material.color.set(0xffcccc);
                    setTimeout(() => target.children[0].material.color.set(0xffffff), 150);
                }
            });
        });

        // --- 9. MULTIPLAYER SYNC ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => { if (id !== socket.id) addOtherPlayer(id, players[id]); });
        });
        socket.on('newPlayer', (info) => addOtherPlayer(info.id, info));
        socket.on('playerMoved', (p) => {
            if (remotePlayers[p.id]) {
                remotePlayers[p.id].position.set(p.x, p.y, p.z);
                remotePlayers[p.id].rotation.y = p.ry;
            }
        });
        socket.on('playerDisconnected', (id) => {
            if (remotePlayers[id]) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; }
        });

        function addOtherPlayer(id, info) {
            const other = createCharacter(0xffffff, "Player"); // Player lain putih
            other.position.set(info.x, 0, info.z);
            scene.add(other);
            remotePlayers[id] = other;
        }

        // --- 10. ANIMATE LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Movement & Sprint Logic (Berjalan Relatif Kamera)
            if(moveData.x || moveData.y) {
                // Sprint jika joystick ditarik penuh
                const sprintMult = (Math.abs(moveData.x) > 0.8 || Math.abs(moveData.y) > 0.8) ? 1.0 : 0.5;
                const speed = 0.35 * sprintMult;
                
                // Hitung arah gerak berdasarkan rotasi kamera saat ini
                const moveX = moveData.x * Math.cos(cameraRotation) + moveData.y * Math.sin(cameraRotation);
                const moveZ = -moveData.x * Math.sin(cameraRotation) + moveData.y * Math.cos(cameraRotation);

                player.position.x += moveX * speed;
                player.position.z -= moveZ * speed;
                player.rotation.y = Math.atan2(moveX, moveZ); // Hadap karakter

                // Sinkron posisi ke server
                socket.emit('playerMovement', { x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y });
            }

            // Gravity (y dasar di 0)
            player.position.y += vY;
            if(player.position.y > 0) vY -= 0.018; else { player.position.y = 0; vY = 0; }

            // NPC AI (Relax Wander)
            npcs.forEach(bot => {
                const dist = bot.position.distanceTo(bot.userData.targetPos);
                if(dist > 1.0) {
                    const dir = bot.userData.targetPos.clone().sub(bot.position).normalize();
                    bot.position.add(dir.multiplyScalar(0.04));
                    bot.lookAt(bot.userData.targetPos);
                } else {
                    // Pilih target baru dalam radius 300
                    bot.userData.targetPos.set(Math.random()*600-300, 0, Math.random()*600-300);
                }
            });

            // Camera Orbit Logic (Mengikuti Player)
            const camDist = 12; // Jarak kamera
            // Menghitung koordinat bola untuk kamera orbit
            camera.position.x = player.position.x + camDist * Math.sin(cameraRotation) * Math.cos(cameraPitch);
            camera.position.z = player.position.z + camDist * Math.cos(cameraRotation) * Math.cos(cameraPitch);
            // +2 agar kamera agak tinggi melihat player
            camera.position.y = player.position.y + camDist * Math.sin(cameraPitch) + 1.8; 

            // Kamera selalu melihat ke arah tubuh player
            camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Responsive saat layar HP diputar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
