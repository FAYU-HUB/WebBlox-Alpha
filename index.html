<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9x-Exodus Infinity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; }
        .btn-ui { position: absolute; bottom: 60px; width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10; touch-action: none; }
        #btn-jump { right: 40px; }
        #btn-attack { right: 130px; background: rgba(255, 0, 0, 0.3); }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

    <div id="joystick-zone"></div>
    <div id="btn-jump" class="btn-ui">JUMP</div>
    <div id="btn-attack" class="btn-ui">⚔️</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        // --- 1. SETUP KONEKSI ---
        const socket = io('http://localhost:7700'); 
        let remotePlayers = {};

        // --- 2. SETUP SCENE & FOG ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        // Tambah kabut biar ujung map halus
        scene.fog = new THREE.Fog(0x87CEEB, 20, 150); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. LANTAI RAKSASA 2K DENGAN TEKSTUR ---
        const loader = new THREE.TextureLoader();
        const grassTexture = loader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
        grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
        grassTexture.repeat.set(100, 100); 

        const floorGeo = new THREE.PlaneGeometry(20000, 20000);
        const floorMat = new THREE.MeshStandardMaterial({ map: grassTexture });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Grid tipis
        const grid = new THREE.GridHelper(2000, 100, 0x000000, 0x000000);
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        scene.add(grid);

        // --- 4. FUNGSI KARAKTER ---
        function createCharacter(color, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.6), new THREE.MeshStandardMaterial({ color: color }));
            body.castShadow = true;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 1.1;
            group.add(body, head);
            group.userData.name = name;
            return group;
        }

        const player = createCharacter(0x2196F3, "You");
        player.position.y = 0.75;
        scene.add(player);

        // --- 5. RINTANGAN (OBSTACLES) ---
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        for(let i=0; i<15; i++) {
            const obstacle = new THREE.Mesh(boxGeo, boxMat);
            obstacle.position.set(Math.random()*60-30, 1, Math.random()*60-30);
            obstacle.castShadow = true;
            scene.add(obstacle);
        }

        // --- 6. NPC RELAX ---
        const npcs = [];
        for(let i=0; i<8; i++) {
            const bot = createCharacter(0x666666, "NPC_" + i);
            bot.position.set(Math.random()*40-20, 0.75, Math.random()*40-20);
            bot.userData.targetPos = new THREE.Vector3(Math.random()*100-50, 0.75, Math.random()*100-50);
            scene.add(bot);
            npcs.push(bot);
        }

        // --- 7. MULTIPLAYER LOGIC ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) addOtherPlayer(id, players[id]);
            });
        });
        socket.on('newPlayer', (info) => addOtherPlayer(info.id, info));
        socket.on('playerMoved', (p) => {
            if (remotePlayers[p.id]) {
                remotePlayers[p.id].position.set(p.x, p.y, p.z);
                remotePlayers[p.id].rotation.y = p.ry;
            }
        });
        socket.on('playerDisconnected', (id) => {
            if (remotePlayers[id]) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; }
        });

        function addOtherPlayer(id, info) {
            const other = createCharacter(info.color || 0xffffff, "Player");
            other.position.set(info.x, 0.75, info.z);
            scene.add(other);
            remotePlayers[id] = other;
        }

        // --- 8. KONTROL & ANIMATE ---
        let moveData = { x: 0, y: 0 }, vY = 0;
        const joystick = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joystick.on('move', (e, d) => { moveData = { x: d.vector.x, y: d.vector.y }; });
        joystick.on('end', () => { moveData = { x: 0, y: 0 }; });
        // Deteksi sentuhan di layar (selain di area joystick/tombol)
window.addEventListener('touchstart', (e) => {
    // Cek jika sentuhan bukan pada area joystick atau tombol
    if (e.target.id === 'joystick-zone' || e.target.classList.contains('btn-ui')) return;
    
    isTouching = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
});

window.addEventListener('touchmove', (e) => {
    if (!isTouching) return;

    const deltaX = e.touches[0].clientX - lastTouchX;
    const deltaY = e.touches[0].clientY - lastTouchY;

    // Sensitivitas kamera (silakan ubah 0.005 jika kurang cepat)
    cameraRotation -= deltaX * 0.005;
    cameraPitch += deltaY * 0.005;

    // Batasi kamera biar gak jungkir balik (Pitch)
    cameraPitch = Math.max(0.2, Math.min(1.2, cameraPitch));

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
});

window.addEventListener('touchend', () => {
    isTouching = false;
});


        document.getElementById('btn-jump').addEventListener('touchstart', () => { if(player.position.y <= 0.76) vY = 0.25; });
        document.getElementById('btn-attack').addEventListener('touchstart', () => {
            player.children[0].material.color.set(0xffffff);
            setTimeout(() => player.children[0].material.color.set(0x2196F3), 100);
            Object.keys(remotePlayers).forEach(id => {
                if(player.position.distanceTo(remotePlayers[id].position) < 2.5) socket.emit('attack', id);
            });
        });

// --- LOGIKA ROTASI LAYAR ---
let cameraRotation = 0; // Rotasi horizontal
let cameraPitch = 0.5;  // Rotasi vertikal (sudut pandang atas-bawah)
let isTouching = false;
let lastTouchX = 0;
let lastTouchY = 0;

        
        
        function animate() {
            requestAnimationFrame(animate);
            if(moveData.x || moveData.y) {
                player.position.x += moveData.x * 0.15;
                player.position.z -= moveData.y * 0.15;
                player.rotation.y = Math.atan2(moveData.x, moveData.y);
                socket.emit('playerMovement', { x: player.position.x, z: player.position.z, ry: player.rotation.y });
            }
            player.position.y += vY;
            if(player.position.y > 0.75) vY -= 0.015; else { player.position.y = 0.75; vY = 0; }

            npcs.forEach(bot => {
                const dist = bot.position.distanceTo(bot.userData.targetPos);
                if(dist > 0.5) {
                    const dir = bot.userData.targetPos.clone().sub(bot.position).normalize();
                    bot.position.add(dir.multiplyScalar(0.04));
                    bot.lookAt(bot.userData.targetPos);
                } else {
                    bot.userData.targetPos.set(Math.random()*200-100, 0.75, Math.random()*200-100);
                }
            });

            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 6, player.position.z + 10), 0.1);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
            // --- LOGIKA PERGERAKAN DENGAN SPEED ---
if (moveData.x || moveData.y) {
    // Tentukan kecepatan: jika ditarik jauh (sprint), speed naik
    // Default: 0.15, Sprint: 0.35
    const currentSpeed = (Math.abs(moveData.x) > 0.8 || Math.abs(moveData.y) > 0.8) ? 0.35 : 0.18;

    player.position.x += moveData.x * currentSpeed;
    player.position.z -= moveData.y * currentSpeed;
    player.rotation.y = Math.atan2(moveData.x, moveData.y);

    // Kirim posisi ke server agar player lain melihat kamu lari cepat
    socket.emit('playerMovement', {
        x: player.position.x,
        z: player.position.z,
        ry: player.rotation.y
    });
        }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
